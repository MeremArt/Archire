version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - job_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/jobs.db
      - NOTIFICATION_BACKEND=none
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ./services:/services
      - job_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/jobs.db
      - SCRAPE_INTERVAL_HOURS=24
      - NOTIFICATION_BACKEND=none
    working_dir: /app
    command: python /services/scheduler.py
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  job_data:
